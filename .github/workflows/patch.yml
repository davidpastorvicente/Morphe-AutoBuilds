name: Auto Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 */3 * *'  # Every 3 days at 6 AM UTC

jobs:
  patch-apps:
    name: Read Configuration
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read-matrix.outputs.matrix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Patch Config
        id: read-matrix
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './patch-config.json';
            const matrix = JSON.parse(fs.readFileSync(path, 'utf8')).patch_list;
            core.setOutput("matrix", JSON.stringify(matrix));

  build-apps:
    name: Build Applications
    needs: patch-apps
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.patch-apps.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Build APK
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building ${{ matrix.app_name }} with ${{ matrix.source }}..."
          sleep $((RANDOM % 30)).$((RANDOM % 100))
          
          python -m src
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.app_name }}-${{ matrix.source }}
          path: "*.apk"

  create-single-release:
    name: Create Single Release
    needs: build-apps
    runs-on: ubuntu-latest
    if: always() 
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Download All APK Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-apks
          if-no-files-found: warn

      - name: Check if Any APKs Were Built
        id: check-apks
        run: |
          # Count APK files
          apk_count=$(find ./all-apks -name "*.apk" 2>/dev/null | wc -l)
          echo "Found $apk_count APK(s)"
          
          if [ $apk_count -eq 0 ]; then
            echo "❌ No APKs were built successfully"
            exit 1
          fi
          echo "✅ $apk_count APK(s) ready for release"
      
      - name: Collect All APKs
        run: |
          mkdir -p ./release-apks
          
          # Copy all APKs to release folder
          echo "📦 Collecting APKs..."
          find ./all-apks -name "*.apk" -exec cp {} ./release-apks/ \;
          
          echo "📁 APKs ready for release:"
          ls -la ./release-apks/
          
          # Count again for display
          final_count=$(ls -1 ./release-apks/*.apk 2>/dev/null | wc -l || echo "0")
          echo "📊 Total APKs: $final_count"
      
      - name: Generate Release Notes
        run: |
          echo "📝 Generating release notes..."
          
          cat > release_notes.md << 'EOF'
          ## 📱 Apps

          | Name | Architecture | Version |
          | --- | --- | --- |
          EOF

          # Collect table rows, then sort for stable release notes ordering.
          tmp_rows=$(mktemp)

          for apk in ./release-apks/*.apk; do
            if [ -f "$apk" ]; then
              filename=$(basename "$apk")
              
              # Extract app name (remove architecture and version info)
              app_name=$(echo "$filename" | sed -E 's/-(arm64-v8a|armeabi-v7a|universal|patch|cli)-.*//' | sed 's/-/ /g')
              
              # Extract architecture
              if [[ "$filename" == *"arm64-v8a"* ]]; then
                arch="arm64-v8a"
              elif [[ "$filename" == *"armeabi-v7a"* ]]; then
                arch="armeabi-v7a"
              else
                arch="universal"
              fi
              
              # Extract version
              version=$(echo "$filename" | grep -oE 'v[0-9]+\.[0-9]+(\.[0-9]+)*' | head -1)
              if [ -z "$version" ]; then
                version="unknown"
              fi

              # Escape pipes to keep markdown table formatting intact.
              app_name=${app_name//|/\\|}
              arch=${arch//|/\\|}
              version=${version//|/\\|}

              printf '| %s | %s | %s |\n' "$app_name" "$arch" "$version" >> "$tmp_rows"
            fi
          done

          sort -f "$tmp_rows" >> release_notes.md
          rm -f "$tmp_rows"

      - name: Create New Release
        id: create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Creating new release with APKs..."
          
          # Count APKs
          apk_count=$(ls -1 ./release-apks/*.apk 2>/dev/null | wc -l || echo "0")
          
          if [ $apk_count -eq 0 ]; then
            echo "❌ No APKs found to release"
            exit 1
          fi
          
          echo "📦 Releasing $apk_count APK(s)..."
          
          # Generate a unique date-based tag
          RELEASE_TAG="$(date +'%Y-%m-%d-%H%M')"
          echo "release-tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          
          # Create the release
          gh release create "$RELEASE_TAG" \
            --title "Modded APKs - $(date +'%Y-%m-%d %H:%M')" \
            --notes-file release_notes.md \
            ./release-apks/*.apk \
            --latest
          
          echo "✅ Release created successfully!"
      
      - name: Display Release URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.create-release.outputs.release-tag }}
        run: |
          release_url=$(gh release view "$RELEASE_TAG" --json url --jq .url)
          echo "🔗 Release URL: $release_url"
          echo ""
          echo "📦 Direct Download Links:"
          for apk in ./release-apks/*.apk; do
            filename=$(basename "$apk")
            echo "- $filename: $release_url/download/$filename"
          done

  cleanup:
    name: Cleanup Workflow Runs
    needs: build-apps
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: write
    steps:
      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 3
          keep_minimum_runs: 5
