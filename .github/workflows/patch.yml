name: Auto Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6 AM UTC

jobs:
  read-config:
    name: Read Configuration
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read-matrix.outputs.matrix }}
      sources: ${{ steps.read-matrix.outputs.sources }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Patch Config
        id: read-matrix
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const patchList = JSON.parse(fs.readFileSync('./patch-config.json', 'utf8')).patch_list;
            const matrix = patchList.map(({ app_name, source }) => ({ app_name, source }));
            const sources = [...new Set(patchList.map(e => e.source))];
            core.setOutput("matrix", JSON.stringify(matrix));
            core.setOutput("sources", JSON.stringify(sources));

  prepare:
    name: Download Tools (${{ matrix.source }})
    needs: read-config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.read-config.outputs.sources) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Download CLI and Patches
        env:
          SOURCE: ${{ matrix.source }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import os, shutil
          from pathlib import Path
          from src.downloader import download_required
          from src.__main__ import resolve_cli_and_patches

          source = os.environ["SOURCE"]
          tools_dir = Path("tools") / source
          tools_dir.mkdir(parents=True, exist_ok=True)

          files, _ = download_required(source)
          cli, patches, _ = resolve_cli_and_patches(files, source)
          if not cli or not patches:
              raise SystemExit(f"❌ Failed to download tools for {source}")

          for f in files:
              shutil.move(str(f), str(tools_dir / f.name))

          print(f"✅ {source}: CLI={cli.name}, Patches={patches.name}")
          PY

      - name: Upload Tools Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tools-${{ matrix.source }}
          path: tools/${{ matrix.source }}/

  build:
    name: ${{ matrix.app_name }} (${{ matrix.source }})
    needs: [read-config, prepare]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.read-config.outputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Download Tools
        uses: actions/download-artifact@v4
        with:
          name: tools-${{ matrix.source }}
          path: tools/${{ matrix.source }}

      - name: Resolve Target Version
        id: resolve-version
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from src import release
          from src.__main__ import resolve_arch, resolve_app_version, resolve_cli_and_patches

          app_name = os.environ["APP_NAME"]
          source = os.environ["SOURCE"]
          tools_dir = Path("tools") / source

          files = list(tools_dir.iterdir())
          cli, patches, _ = resolve_cli_and_patches(files, source)
          if not cli or not patches:
              raise SystemExit("❌ CLI or patches not found in tools dir")

          arches = resolve_arch(app_name, source)
          arch = arches[0]

          version = resolve_app_version(app_name, str(cli), str(patches), arch)
          if not version:
              raise SystemExit(f"❌ Failed to resolve version for {app_name}")

          tag = f"{app_name}-v{version}"
          from src.downloader import get_app_name
          app_title = get_app_name(app_name)
          cli_version = release.extract_version(cli.name)
          patches_version = release.extract_version(patches.name)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"release_tag={tag}\n")
              fh.write(f"app_title={app_title}\n")
              fh.write(f"cli_version={cli_version}\n")
              fh.write(f"patches_version={patches_version}\n")
              fh.write(f"arch={', '.join(arches)}\n")
          print(f"Resolved {app_name} -> {version} ({tag}) [{arch}]")
          PY

      - name: Check Existing Release
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve-version.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists for $RELEASE_TAG, skipping build"
          else
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
            echo "No release found for $RELEASE_TAG, proceeding with build"
          fi

      - name: Build ${{ matrix.app_name }}
        if: steps.check-release.outputs.skip_build != 'true'
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          TOOLS_DIR: tools/${{ matrix.source }}
          VERSION: ${{ steps.resolve-version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building ${{ matrix.app_name }} with ${{ matrix.source }}..."
          sleep $((RANDOM % 30)).$((RANDOM % 100))

          python -m src

      - name: Upload APK Artifact
        if: steps.check-release.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.app_name }}-${{ matrix.source }}
          path: "*.apk"

      - name: Generate Release Notes
        if: steps.check-release.outputs.skip_build != 'true'
        env:
          APP_TITLE: ${{ steps.resolve-version.outputs.app_title }}
          SOURCE: ${{ matrix.source }}
          ARCH: ${{ steps.resolve-version.outputs.arch }}
          VERSION: ${{ steps.resolve-version.outputs.version }}
          CLI_VERSION: ${{ steps.resolve-version.outputs.cli_version }}
          PATCHES_VERSION: ${{ steps.resolve-version.outputs.patches_version }}
        run: |
          {
            echo "- **App:** \`${APP_TITLE}\`"
            echo "- **Version:** \`${VERSION}\`"
            echo "- **Source:** \`${SOURCE}\`"
            echo "- **Architecture:** \`${ARCH}\`"
            echo "- **Patches version:** \`${PATCHES_VERSION}\`"
            echo "- **CLI version:** \`${CLI_VERSION}\`"
            echo "- **Built at:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } > release_notes.md

      - name: Publish Release
        if: steps.check-release.outputs.skip_build != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_TITLE: ${{ steps.resolve-version.outputs.app_title }}
          VERSION: ${{ steps.resolve-version.outputs.version }}
          RELEASE_TAG: ${{ steps.resolve-version.outputs.release_tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "${APP_TITLE} v${VERSION}" \
            --notes-file release_notes.md \
            ./*.apk

          release_url=$(gh release view "$RELEASE_TAG" --json url --jq .url)
          echo "🔗 Release URL: $release_url"
          echo ""
          echo "📦 Direct Download Links:"
          for apk in ./*.apk; do
            filename=$(basename "$apk")
            echo "- $filename: $release_url/download/$filename"
          done

