name: Auto Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 */3 * *'  # Every 3 days at 6 AM UTC

jobs:
  patch-apps:
    name: Read Configuration
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read-matrix.outputs.matrix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Patch Config
        id: read-matrix
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './patch-config.json';
            const matrix = JSON.parse(fs.readFileSync(path, 'utf8')).patch_list;
            core.setOutput("matrix", JSON.stringify(matrix));

  build-apps:
    name: Build and Release Applications
    needs: patch-apps
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.patch-apps.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Resolve Target Version
        id: resolve-version
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from src import release
          from src.__main__ import resolve_build_inputs, resolve_download_target
          
          app_name = os.environ["APP_NAME"]
          source = os.environ["SOURCE"]
          _, _, cli, patches, _ = resolve_build_inputs(source)
          if not cli or not patches:
              raise SystemExit("Failed to resolve CLI or patches")
          
          _, version = resolve_download_target(app_name, str(cli), str(patches))
          if not version:
              raise SystemExit("Failed to resolve target version")
          
          tag = f"{app_name}-v{version}"
          app_title = app_name.replace("-", " ").title().replace("Youtube", "YouTube")
          cli_version = release.extract_version(cli.name)
          patches_version = release.extract_version(patches.name)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"release_tag={tag}\n")
              fh.write(f"app_title={app_title}\n")
              fh.write(f"cli_version={cli_version}\n")
              fh.write(f"patches_version={patches_version}\n")
          print(f"Resolved {app_name} -> {version} ({tag})")
          PY

      - name: Check Existing Release
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve-version.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists for $RELEASE_TAG, skipping build"
          else
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
            echo "No release found for $RELEASE_TAG, proceeding with build"
          fi

      - name: Build APK
        if: steps.check-release.outputs.skip_build != 'true'
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          ARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building ${{ matrix.app_name }} with ${{ matrix.source }}..."
          sleep $((RANDOM % 30)).$((RANDOM % 100))
          
          python -m src
      
      - name: Upload APK Artifact
        if: steps.check-release.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.app_name }}-${{ matrix.source }}
          path: "*.apk"
      
      - name: Generate Release Notes
        if: steps.check-release.outputs.skip_build != 'true'
        env:
          APP_NAME: ${{ matrix.app_name }}
          APP_TITLE: ${{ steps.resolve-version.outputs.app_title }}
          SOURCE: ${{ matrix.source }}
          VERSION: ${{ steps.resolve-version.outputs.version }}
          CLI_VERSION: ${{ steps.resolve-version.outputs.cli_version }}
          PATCHES_VERSION: ${{ steps.resolve-version.outputs.patches_version }}
        run: |
          apk_file=$(ls *.apk 2>/dev/null | head -1)
          if [ -n "$apk_file" ]; then
            rest="${apk_file#${APP_NAME}-}"
            arch="${rest%%-${SOURCE}*}"
          else
            arch="unknown"
          fi
          {
            echo "- **App:** \`${APP_TITLE}\`"
            echo "- **Version:** \`${VERSION}\`"
            echo "- **Source:** \`${SOURCE}\`"
            echo "- **Architecture:** \`${arch}\`"
            echo "- **Patches version:** \`${PATCHES_VERSION}\`"
            echo "- **CLI version:** \`${CLI_VERSION}\`"
            echo "- **Built at:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } > release_notes.md

      - name: Create App Release
        if: steps.check-release.outputs.skip_build != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_TITLE: ${{ steps.resolve-version.outputs.app_title }}
          VERSION: ${{ steps.resolve-version.outputs.version }}
          RELEASE_TAG: ${{ steps.resolve-version.outputs.release_tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "${APP_TITLE} v${VERSION}" \
            --notes-file release_notes.md \
            ./*.apk

          release_url=$(gh release view "$RELEASE_TAG" --json url --jq .url)
          echo "🔗 Release URL: $release_url"
          echo ""
          echo "📦 Direct Download Links:"
          for apk in ./*.apk; do
            filename=$(basename "$apk")
            echo "- $filename: $release_url/download/$filename"
          done
