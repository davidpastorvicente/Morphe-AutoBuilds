name: Manual Patch and Update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name (from apps/ folder)'
        required: true
        type: string
        default: 'youtube'
      source:
        description: 'Source name (from sources/ folder)'
        required: true
        type: string
        default: 'revanced'
      version:
        description: 'Specific version (leave empty for latest)'
        required: false
        type: string
        default: ''
      architecture:
        description: 'Architecture to build'
        required: false
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - universal
        default: 'universal'
      replace_in_release:
        description: 'Replace APK in existing release'
        required: true
        type: boolean
        default: true

jobs:
  manual-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set Specific Version (if provided)
        if: ${{ inputs.version != '' }}
        run: |
          # Update app config with specific version
          for dir in apps/apkmirror apps/apkpure apps/uptodown; do
            config_file="$dir/${{ inputs.app_name }}.json"
            if [ -f "$config_file" ]; then
              echo "Updating $config_file with version ${{ inputs.version }}"
              # Update JSON with specific version
              python -c "
              import json, sys, os
              with open('$config_file', 'r') as f:
                  config = json.load(f)
              config['version'] = '${{ inputs.version }}'
              with open('$config_file', 'w') as f:
                  json.dump(config, f, indent=2)
              "
              echo "Updated: $config_file"
              break
            fi
          done
      
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Resolve Build Metadata
        id: build-meta
        env:
          APP_NAME: ${{ inputs.app_name }}
          SOURCE: ${{ inputs.source }}
          ARCH: ${{ inputs.architecture }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from src import release
          from src.__main__ import resolve_build_inputs, resolve_download_target

          app_name = os.environ["APP_NAME"]
          source = os.environ["SOURCE"]
          arch = os.environ["ARCH"]
          _, _, cli, patches, _ = resolve_build_inputs(source)
          if not cli or not patches:
              raise SystemExit("Failed to resolve CLI or patches")

          _, version = resolve_download_target(app_name, str(cli), str(patches), arch)
          if not version:
              raise SystemExit("Failed to resolve target version")

          app_title = app_name.replace("-", " ").title().replace("Youtube", "YouTube")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"release_tag={app_name}-v{version}\n")
              fh.write(f"release_title={app_title} v{version}\n")
              fh.write(f"cli_version={release.extract_version(cli.name)}\n")
              fh.write(f"patches_version={release.extract_version(patches.name)}\n")
          PY
      
      - name: Build APK
        env:
          APP_NAME: ${{ inputs.app_name }}
          SOURCE: ${{ inputs.source }}
          ARCH: ${{ inputs.architecture }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔧 Building ${{ inputs.app_name }} with ${{ inputs.source }} for ${{ inputs.architecture }} architecture..."
          python -m src
      
      - name: Find Built APK
        id: find-apk
        run: |
          # Find the built APK file(s)
          apk_files=$(ls -1 *.apk 2>/dev/null)
          if [ -z "$apk_files" ]; then
            echo "❌ No APK files found"
            exit 1
          fi
          
          # Fix for multi-line output in GitHub Actions
          {
            echo "apk_files<<EOF"
            echo "$apk_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          
          echo "apk_count=$(echo "$apk_files" | wc -l)" >> "$GITHUB_OUTPUT"
          
          # Print for debugging
          echo "Found these APKs:"
          echo "$apk_files"
      
      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: manual-apk-${{ inputs.app_name }}-${{ inputs.architecture }}
          path: "*.apk"
      
      - name: Check Existing Release
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.build-meta.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "✅ Release '$RELEASE_TAG' exists"
            echo "release_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Release '$RELEASE_TAG' does not exist"
            echo "release_exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Stop if Release Exists and Replace is Disabled
        if: ${{ steps.check-release.outputs.release_exists == 'true' && inputs.replace_in_release != true }}
        run: |
          echo "❌ Release already exists and replace_in_release is false"
          exit 1

      - name: Create or Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.build-meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.build-meta.outputs.release_title }}
          VERSION: ${{ steps.build-meta.outputs.version }}
          CLI_VERSION: ${{ steps.build-meta.outputs.cli_version }}
          PATCHES_VERSION: ${{ steps.build-meta.outputs.patches_version }}
        run: |
          {
            echo "- **App:** \`${{ inputs.app_name }}\`"
            echo "- **Version:** \`${VERSION}\`"
            echo "- **Source:** \`${{ inputs.source }}\`"
            echo "- **Requested architecture:** \`${{ inputs.architecture }}\`"
            echo "- **Patches version:** \`${PATCHES_VERSION}\`"
            echo "- **CLI version:** \`${CLI_VERSION}\`"
            echo "- **Built at:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } > release_notes.md

          if [ "${{ steps.check-release.outputs.release_exists }}" == "true" ]; then
            echo "⬆️ Uploading new assets (clobbering existing)..."
            gh release upload "$RELEASE_TAG" *.apk --clobber
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file release_notes.md
          else
            echo "🚀 Creating new release..."
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file release_notes.md \
              *.apk
          fi
          
          echo "✅ Release updated successfully!"
      
      - name: Show Download Links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.build-meta.outputs.release_tag }}
        run: |
          release_url=$(gh release view "$RELEASE_TAG" --json url --jq .url)
          echo "🔗 Updated Release URL: $release_url"
          echo ""
          echo "📦 Direct APK links:"
          for apk in *.apk; do
            echo "  - $release_url/download/$apk"
          done
      
      - name: Cleanup Version Override
        if: ${{ inputs.version != '' && always() }}
        run: |
          # Reset version to empty in configs
          for dir in apps/apkmirror apps/apkpure apps/uptodown; do
            config_file="$dir/${{ inputs.app_name }}.json"
            if [ -f "$config_file" ]; then
              echo "Resetting version in $config_file"
              python -c "
              import json, sys, os
              with open('$config_file', 'r') as f:
                  config = json.load(f)
              config['version'] = ''
              with open('$config_file', 'w') as f:
                  json.dump(config, f, indent=2)
              "
            fi
          done
